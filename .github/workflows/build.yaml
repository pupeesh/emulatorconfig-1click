name: Build Emulation Manager

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: emulator-config-win.exe
          - os: ubuntu-latest
            asset_name: emulator-config-linux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev build-essential xvfb

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Standalone Executable
      shell: bash
      run: |
        SCRIPT_FILE=$(ls *.pyw | head -n 1)
        echo "Found target script: $SCRIPT_FILE"
        pyinstaller --noconsole --onefile --name "${{ matrix.asset_name }}" "$SCRIPT_FILE"

    - name: Upload Built Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/*