name: Build and Test Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    name: Build Executable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux headless Tkinter display setup
      - name: Install Linux GUI Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # Standardized Test Execution using Module Discovery
      - name: Run Unit Tests (Linux)
        if: runner.os == 'Linux'
        run: |
          PYTHONPATH=. xvfb-run python -m unittest discover -s tests -p "test_*.py"

      - name: Run Unit Tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: |
          python -m unittest discover -s tests -p "test_*.py"
        env:
          PYTHONPATH: .

      # PyInstaller Standalone Build (Single-line to avoid shell syntax mismatch)
      - name: Build Standalone Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "config_templates;config_templates" --add-data "core;core" --add-data "ui;ui" --name "EmulatorConfig-1Click" emulatorconfig-1click.pyw

      - name: Build Standalone Executable (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed --add-data "config_templates:config_templates" --add-data "core:core" --add-data "ui:ui" --name "EmulatorConfig-1Click" emulatorconfig-1click.pyw

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EmulatorConfig-1Click-${{ runner.os }}
          path: dist/
