name: Build Emulation Manager

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: emulator-config-win.exe
          - os: ubuntu-latest
            asset_name: emulator-config-linux

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk python3-dev build-essential xvfb

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Standalone Executable
      run: |
        python -c "import glob; print(glob.glob('*.pyw'))"
        pyinstaller --noconsole --onefile --name "${{ matrix.asset_name }}" *.pyw

    - name: Upload Built Executable Artifact
      uses: actions/upload-artifact@v5
      with:
        name: ${{ matrix.asset_name }}
        path: dist/*