name: Build and Test Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    name: Build Executable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux GUI dependencies setup for headless Tkinter
      - name: Install Linux GUI Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # Run updated standardized unit tests
      - name: Run Unit Tests (Linux Headless)
        if: runner.os == 'Linux'
        run: |
          xvfb-run python tests/test_config_writers.py
          xvfb-run python tests/test_system_poller.py
          xvfb-run python tests/test_backup_manager.py
          xvfb-run python tests/test_emulator_resolver.py

      - name: Run Unit Tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: |
          python tests/test_config_writers.py
          python tests/test_system_poller.py
          python tests/test_backup_manager.py
          python tests/test_emulator_resolver.py

      # PyInstaller build step with modular subfolder bundling
      - name: Build Standalone Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed `
            --add-data "config_templates;config_templates" `
            --add-data "core;core" `
            --add-data "ui;ui" `
            --name "EmulatorConfig-1Click" `
            emulatorconfig-1click.pyw

      - name: Build Standalone Executable (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --add-data "config_templates:config_templates" \
            --add-data "core:core" \
            --add-data "ui:ui" \
            --name "EmulatorConfig-1Click" \
            emulatorconfig-1click.pyw

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EmulatorConfig-1Click-${{ runner.os }}
          path: dist/
