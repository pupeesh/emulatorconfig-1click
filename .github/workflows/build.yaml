name: Cross-Platform Build & Test Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Build Executable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: emulator-config-linux
            asset_name: emulator-config-linux
          - os: windows-latest
            artifact_name: emulator-config-win.exe
            asset_name: emulator-config-win.exe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies & Headless Display Tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk build-essential lspci

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # --- Automated Unit Tests ---
      - name: Run Core Engine Verification Tests
        run: |
          python tests/test_step1.py

      # --- PyInstaller Compilation ---
      - name: Build Standalone Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconsole --onefile --add-data "config_templates;config_templates" emulatorconfig-1click.pyw

      - name: Build Standalone Binary (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run pyinstaller --noconsole --onefile --add-data "config_templates:config_templates" emulatorconfig-1click.pyw

      - name: Organize Dist Artifacts
        shell: bash
        run: |
          mkdir -p release_out
          if [ -f "dist/emulatorconfig-1click.exe" ]; then
            mv "dist/emulatorconfig-1click.exe" "release_out/${{ matrix.artifact_name }}"
          elif [ -f "dist/emulatorconfig-1click" ]; then
            mv "dist/emulatorconfig-1click" "release_out/${{ matrix.artifact_name }}"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release_out/${{ matrix.artifact_name }}
